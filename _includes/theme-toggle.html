<!-- ============================================================
     THEME TOGGLE (Accessible + Modern)
============================================================ -->
<button 
  class="theme-toggle" 
  id="themeToggle" 
  aria-label="Toggle light and dark theme"
>

  <div class="theme-toggle-sphere">

    <!-- Sun Icon (Light Mode) -->
    <img 
      src="/assets/icons/sun.svg" 
      alt="Light mode icon" 
      class="theme-icon theme-icon-light"
    >

    <!-- Moon Icon (Dark Mode) -->
    <img 
      src="/assets/icons/moon.svg" 
      alt="Dark mode icon" 
      class="theme-icon theme-icon-dark"
    >

  </div>

</button>
