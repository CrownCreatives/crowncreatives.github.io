<header class="site-header">

      <img src="/assets/images/light-crown.png"
           class="header-crown-img"
           id="crown-emblem"
           alt="Crown Creatives">
    </div>

    <!-- CENTER: Title + Tagline -->
    <div class="header-center">
      <div class="header-title-block">

      <div class="mobile-menu-toggle" onclick="toggleMobileMenu()">

  <!-- Nav bar -->
  <nav class="site-nav">
    <ul>
      <li><a href="/" class="cc-soft-glow">Home</a></li>

      <li><a href="/gallery/" class="cc-soft-glow">Gallery</a></li>
