<!-- ============================================================
     HOMEPAGE HERO HEADER — CINEMATIC + MAGICAL
============================================================ -->
<header class="home-hero-header fade-section">

  <!-- HERO CROWN -->
  <img
    src="{{ '/assets/icons/day-crown.svg' | relative_url }}"
    data-day="{{ '/assets/icons/day-crown.svg' | relative_url }}"
    data-night="{{ '/assets/icons/crown-hero-night.png' | relative_url }}"
    alt="Crown Creatives Hero Emblem"
    class="hero-crown-cinematic"
  >

  <!-- HERO GALLERY LANES -->
  <div class="hero-gallery-lanes">
    <img class="lane-img lane-left" alt="">
    <img class="lane-img lane-right" alt="">
  </div>

  <!-- HERO TAGLINE -->
  <div class="hero-text">
    <p>{{ page.hero_tagline | default: "Where imagination becomes reality" }}</p>
  </div>

  <!-- MAGIC TICKER -->
  <div class="magic-ticker">
    <span class="magic-ticker-text"></span>
  </div>

  <!-- THEME TOGGLE -->
  <button id="theme-toggle" class="theme-toggle">☀️ / 🌙</button>

</header>
