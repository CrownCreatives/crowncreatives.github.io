<header class="site-header">
  <div class="site-header-inner">

    <!-- CENTRED CROWN + TITLE + TAGLINE -->
    <div class="header-centre">
      <img src="/assets/icons/cc-monogram.svg" class="header-crown-hero" alt="Crown Creatives Crown">
      <h1 class="site-title">Crown Creatives</h1>
      <p class="site-tagline">Artistry • Resilience • Imagination</p>
    </div>

    <!-- THEME TOGGLE -->
    <div class="header-right">
      <button class="theme-toggle">
        <div class="theme-toggle-sphere">
          <img src="/assets/icons/sun.svg" class="theme-icon active" alt="Light Mode">
          <img src="/assets/icons/moon.svg" class="theme-icon" alt="Dark Mode">
        </div>
      </button>
    </div>

  </div>
</header>
