<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery | Crown Creatives</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="include-header"></div>
<div id="include-nav"></div>

<main>

<div class="container">
    <div class="card">
        <h2>Artwork & Experiments</h2>
        <p>Upload images to <code>assets/images/</code> and reference them below.</p>
    </div>

    <!-- Responsive Gallery Grid -->
    <div class="gallery-grid">
        <img src="assets/images/sample1.jpg" alt="Artwork 1">
        <img src="assets/images/sample2.jpg" alt="Artwork 2">
        <img src="assets/images/sample3.jpg" alt="Artwork 3">
        <img src="assets/images/sample4.jpg" alt="Artwork 4">
    </div>
</div>

</main>

<!-- Floating Mobile Social Bar (kept, but moved outside main) -->
<div class="mobile-social-bar">
    <a href="https://facebook.com/profile.php?id=61556386467490" target="_blank">
        <img src="assets/icons/facebook.svg" alt="Facebook">
    </a>
    <a href="https://instagram.com/crown_creatives_uk/" target="_blank">
        <img src="assets/icons/instagram.svg" alt="Instagram">
    </a>
</div>

<div id="include-footer"></div>
<div id="include-ticker"></div>

<script src="includes.js"></script>

</body>
</html>
