<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8caff"/>
      <stop offset="60%" stop-color="#b38cff"/>
      <stop offset="100%" stop-color="#7a4fff"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgba(176,0,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(176,0,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#moonGlow)"/>

  <!-- Crescent -->
  <path d="
    M 330 256
    A 140 140 0 1 1 190 116
    A 110 110 0 1 0 330 256
  " fill="url(#moonCore)"/>

  <!-- Stars -->
