<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd86b"/>
      <stop offset="40%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7b00"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgba(255,200,80,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,140,66,0)"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#sunGlow)"/>

  <!-- Core -->
  <circle cx="256" cy="256" r="120" fill="url(#sunCore)"/>

  <!-- Rays -->
  <g stroke="#ffb347" stroke-width="22" stroke-linecap="round">
    <line x1="256" y1="40"  x2="256" y2="120"/>
    <line x1="256" y1="392" x2="256" y2="472"/>
    <line x1="40"  y1="256" x2="120" y2="256"/>
    <line x1="392" y1="256" x2="472" y2="256"/>

    <line x1="110" y1="110" x2="160" y2="160"/>
    <line x1="352" y1="352" x2="402" y2="402"/>
    <line x1="110" y1="402" x2="160" y2="352"/>
    <line x1="352" y1="160" x2="402" y2="110"/>
  </g>
</svg>
