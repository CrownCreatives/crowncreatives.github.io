<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Royal Gold → Amber Gradient -->
    <linearGradient id="cpRoyalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd86b"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </linearGradient>

    <!-- Magical Glow -->
    <filter id="cpRoyalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.85 0 0 0
                0 0 0.4 0 0
                0 0 0 0.75 0"/>
    </filter>
  </defs>

  <!-- Background Disc -->
  <circle cx="32" cy="32" r="28" fill="#050816"/>
  <circle cx="32" cy="32" r="28" fill="url(#cpRoyalGrad)" opacity="0.18"/>

  <!-- Crest Shield -->
  <path d="M18 16h28v15.5c0 8.2-6.4 15-14 17
           c-7.6-2-14-8.8-14-17V16z"
        fill="none"
        stroke="url(#cpRoyalGrad)"
        stroke-width="2.2"
        filter="url(#cpRoyalGlow)"
        stroke-linejoin="round"/>

  <!-- Letter C (stylised royal curve) -->
  <path d="M29 22
           c-4.4 0-7.4 3.2-7.4 7.8
           s3 7.8 7.4 7.8
           c2 0 3.7-0.6 5.1-1.8"
        fill="none"
        stroke="#fff4d0"
        stroke-width="2.2"
        stroke-linecap="round"/
