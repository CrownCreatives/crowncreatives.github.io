<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold → Amber Gradient -->
    <linearGradient id="talkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd86b"/>
      <stop offset="50%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </linearGradient>

    <!-- Magical Glow -->
    <filter id="talkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0
                0 0.85 0 0 0
                0 0 0.4 0 0
                0 0 0 0.8 0"/>
    </filter>
  </defs>

  <!-- Dark base disc -->
  <circle cx="24" cy="24" r="20" fill="#050816"/>
  <circle cx="24" cy="24" r="20" fill="url(#talkGrad)" opacity="0.18"/>

  <!-- Speech bubble -->
  <path d="M15 17h12c3.3 0 6 2.3 6 5.2v2.6c0 2.9-2.7 5.2-6 5.2h-4.5l-3.5 3.5
           c-0.4 0.4-1 .1-1-0.4v-3.1C16.6 29.7 15 27.9 15 25.4v-3.2
           c0-2.3 2-5.2 5-5.2z"
        fill="none"
        stroke="#fff4d0"
        stroke-width="1.8"
        stroke-linejoin="round"/>

  <!-- Talking / sound lines -->
  <path d="M30.5 19.5c1.6 0.8 2.7 2.3 2.7 4.1s-1.1 3.3-2.7 4.1"
        fill="none"
        stroke="url(#talkGrad)"
        stroke-width="1.6"
        stroke-linecap="round"/>

  <path d="M33.5 18c2.2 1.2 3.7 3.4 3.7 5.9s-1.5 4.7-3.7 5.9"
        fill="none"
        stroke="url(#talkGrad)"
        stroke-width="1.6"
        stroke-linecap="round"/>

  <!-- Outer ring glow -->
  <circle cx="24" cy="24" r="19"
          fill="none"
          stroke="url(#talkGrad)"
          stroke-width="1.6"
          filter="url(#talkGlow)"/>
</svg>
