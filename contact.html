<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Crown Creatives</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="assets/images/banner-logo.png" alt="Crown Creatives Banner Logo">
    <h1>Contact</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">My Story</a>
    <a href="projects.html">Projects</a>
    <a href="blog.html">Blog</a>
    <a href="gallery.html">Gallery</a>
    <a href="videos.html">Videos</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Say Hello</h2>
        <p>
            Whether you’re here for the art, the story, or both — feel free to reach out.
        </p>
        <form>
            <div>
                <label for="name">Name</label>
                <input id="name" type="text" placeholder="Your name">
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com">
            </div>
            <div>
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="What would you like to share?"></textarea>
            </div>
            <input type="submit" value="Send Message (static)">
        </form>
        <p style="margin-top:10px; font-size:0.8rem; color:#6b7280;">
            Note: On GitHub Pages this form is static — you can later hook it to a service like Formspree or Netlify Forms.
        </p>
    </div>
</div>

<footer>
    © 2026 Crown Creatives – Contact
</footer>

</body>
</html>
