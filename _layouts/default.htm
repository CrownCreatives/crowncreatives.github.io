<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Crown Creatives</title>

  <link rel="stylesheet" href="/assets/css/style.css">
  <script defer src="/assets/js/script.js"></script>
</head>

<body class="fade-enter">

  <!-- ===========================
       HEADER
  ============================ -->
  <header class="site-header">

    <div class="header-inner">

      <!-- Crown Wrapper (Parallax + Shimmer + Crossfade) -->
      <div class="crown-wrapper">
        <img src="/assets/images/big-logo.png" class="crown-logo light-logo" alt="Crown Creatives Logo">
        <img src="/assets/images/big-logo-dark.png" class="crown-logo dark-logo" alt="Crown Creatives Dark Logo">
        <div class="crown-shimmer"></div>
      </div>

      <!-- Header Text -->
      <div class="header-text">
        <h1>Crown Creatives</h1>
        <p class="tagline">Artistry • Resilience • Imagination</p>
      </div>

    </div>

  </header>


  <!-- ===========================
       NAVIGATION
  ============================ -->
  <nav class="site-nav">
    <a href="/">Home</a>
    <a href="/gallery.html">Gallery</a>
    <a href="/projects.html">Projects</a>
    <a href="/videos.html">Videos</a>
    <a href="/podcasts.html">Podcasts</a>
    <a href="/blog.html">Blog</a>
    <a href="/about.html">About</a>
  </nav>


  <!-- ===========================
       MAIN CONTENT
  ============================ -->
  <main class="container">
    {{ content }}
  </main>


  <!-- ===========================
       TICKER (ABOVE FOOTER)
  ============================ -->
  <div class="ticker-bar">
    <div class="ticker-inner">
      <span>Welcome to Crown Creatives — Crafting worlds with intention.</span>
      <span>New artwork and podcasts added regularly.</span>
      <span>Creativity, recovery, and resilience in motion.</span>
    </div>
  </div>


  <!-- ===========================
       FOOTER
  ============================ -->
  {% include includes.js %}

</body>
</html>
