<header class="site-header">

  <div class="logo-wrapper">

    <!-- Crown Logos -->
    <img 
      src="/assets/images/big-logo.png" 
      alt="Crown Creatives Logo" 
      class="logo light-logo"
    >
    <img 
      src="/assets/images/big-logo-dark.png" 
      alt="Crown Creatives Logo Dark" 
      class="logo dark-logo"
    >

    <div class="brand-text">
      <h1 class="site-title">CROWN CREATIVES</h1>
      <p class="site-tagline">Artistry • Resilience • Imagination</p>
    </div>

  </div>

  <nav class="main-nav">
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/gallery">Gallery</a></li>
      <li><a href="/projects">Projects</a></li>
      <li><a href="/videos">Videos</a></li>
      <li><a href="/podcasts">Podcasts</a></li>
      <li><a href="/blog">Blog</a></li>
      <li><a href="/about">About</a></li>
    </ul>
  </nav>

  <!-- Bubble Background -->
  <div class="bubble-bg">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

</header>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Crown Creatives</title>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="theme-light">

    <!-- HEADER -->
    {% include header.html %}

    <!-- MAIN CONTENT WRAPPER -->
    <main class="content-wrapper">
        <div class="content-card">
            {{ content }}
        </div>
    </main>

    <!-- TICKER -->
    {% include ticker.html %}

    <!-- FOOTER -->
    {% include footer.html %}

    <!-- BACK TO TOP BUTTON -->
    {% include backtotop.html %}

    <!-- JS for toggles -->
    <script src="/assets/js/theme-toggle.js"></script>
    <script src="/assets/js/mobile-menu.js"></script>
    <script src="/assets/js/backtotop.js"></script>

</body>
</html>
