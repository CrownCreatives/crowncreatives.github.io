<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Crown Creatives</title>

  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body class="fade-enter">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <img src="/assets/images/big-logo.png" class="crown-logo light-logo" alt="Crown Creatives Logo">
      <img src="/assets/images/big-logo-dark.png" class="crown-logo dark-logo" alt="Crown Creatives Dark Logo">
      <h1>Crown Creatives</h1>
    </div>
  </header>

  <!-- NAVIGATION -->
  <nav class="site-nav">
    <a href="/">Home</a>
    <a href="/about.html">About</a>
    <a href="/blog.html">Blog</a>
    <a href="/gallery.html">Gallery</a>
    <a href="/projects.html">Projects</a>
    <a href="/videos.html">Videos</a>
    <a href="/podcasts.html">Podcasts</a>
    <a href="/contacts.html">Contact</a>
  </nav>

  <!-- TICKER -->
  <div class="ticker-bar">
    <div class="ticker-inner">
      <span>Welcome to Crown Creatives — Crafting worlds with intention.</span>
      <span>New artwork and podcasts added regularly.</span>
      <span>Creativity, recovery, and resilience in motion.</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="container">
    {{ content }}
  </main>

  <!-- FOOTER -->
  {% include includes.js %}

  <!-- GLOBAL SCRIPT -->
  <script src="/assets/js/script.js"></script>

</body>
</html>
