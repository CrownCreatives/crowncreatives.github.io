<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>

<body class="magic-bg-gradient">

  <!-- ============================================================
       MAGICAL BACKGROUND ENGINE
  ============================================================= -->
  <div class="cc-bg-magic-layer">
    <div class="cc-bg-nebula"></div>
    <div class="cc-bg-stars"></div>
    <div class="cc-bg-particles">
      <div class="cc-bg-particle p1"></div>
      <div class="cc-bg-particle p2"></div>
      <div class="cc-bg-particle p3"></div>
      <div class="cc-bg-particle p4"></div>
      <div class="cc-bg-particle p5"></div>
    </div>
  </div>

  <!-- ============================================================
       PAGE TRANSITION OVERLAY
  ============================================================= -->
  <div class="page-transition-overlay"></div>

  <!-- ============================================================
       FOREGROUND MAGIC PARTICLES
  ============================================================= -->
  <div class="magic-particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- ============================================================
       HEADER AREA
       (Theme toggle first, nav underneath, hero inside page content)
  ============================================================= -->
  {% include theme-toggle.html %}
  {% include nav.html %}

  <!-- ============================================================
       MAIN CONTENT (home.html or page.html injects hero)
  ============================================================= -->
  <main class="page-content" aria-label="Content">
    {{ content }}
  </main>

  <!-- ============================================================
       FOOTER + BACK TO TOP
  ============================================================= -->
  {% include footer.html %}
  {% include backtotop.html %}

  <!-- ============================================================
       SCRIPTS
  ============================================================= -->
  <script src="/assets/js/theme-toggle.js"></script>
  <script src="/assets/js/page-transition.js"></script>
  <script src="/assets/js/mobile-menu.js"></script>
  <script src="/assets/js/lightbox.js"></script>

</body>
</html>
