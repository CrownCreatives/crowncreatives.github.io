<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} — Crown Creatives</title>

  <!-- Main Magical UI Stylesheet -->
  <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>

  <!-- ✨ MAGICAL BACKGROUND LAYERS -->
  <div class="magic-bg">
    <div class="magic-bg-layer magic-bg-fog"></div>
    <div class="magic-bg-layer magic-bg-bubbles"></div>
    <div class="magic-bg-layer magic-bg-swirl"></div>
  </div>

  <!-- ✨ HEADER -->
  {% include header.html %}

  <!-- ✨ MOBILE MENU PANEL -->
  <div class="mobile-menu-panel" id="mobileMenu">
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/gallery/">Gallery</a>
    <a href="/contact/">Contact</a>
  </div>

  <!-- ✨ PAGE CONTENT -->
  <main class="site-content">
    {{ content }}
  </main>

  <!-- ✨ LIGHTBOX OVERLAY -->
  <div class="lightbox-overlay" id="lightbox">
    <div class="lightbox-content">
      <img id="lightbox-img" src="">
    </div>
    <div class="lightbox-close" onclick="closeLightbox()">×</div>
  </div>

  <!-- ✨ FOOTER -->
  {% include footer.html %}

  <!-- ✨ JAVASCRIPT (LOAD ORDER MATTERS) -->
  <script src="/assets/js/theme-toggle.js"></script>
  <script src="/assets/js/mobile-menu.js"></script>
  <script src="/assets/js/lightbox.js"></script>

</body>
</html>
