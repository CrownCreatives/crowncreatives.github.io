<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Crown Creatives" }}</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Correct CSS Path -->
    <link rel="stylesheet" href="/assets/css/style.css">

</head>

<body class="theme-light">

    <!-- MAGIC FOG -->
    <div class="magic-fog"></div>

    <!-- BUBBLES -->
    <div class="bubble-bg">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- HEADER -->
    <header class="site-header">
        <div class="header-bar">
            <div class="header-content">

                <div class="header-left">
                  <img src="/assets/images/light-crown.png" class="logo light-logo">
<img src="/assets/images/dark-crown.png" class="logo dark-logo">

                </div>

                <div class="brand-text">
                    <h1 class="site-title">CROWN CREATIVES</h1>
                    <p class="site-tagline">ARTISTRY • RESILIENCE • IMAGINATION</p>
                </div>

                <div class="theme-toggle" id="themeToggle">☾</div>

            </div>
        </div>

        <nav class="main-nav">
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/gallery">Gallery</a></li>
                <li><a href="/projects">Projects</a></li>
                <li><a href="/videos">Videos</a></li>
                <li><a href="/podcasts">Podcasts</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-wrapper">
        {{ content }}
    </main>

    <footer class="site-footer">
        <p>© {{ "now" | date: "%Y" }} Crown Creatives — A Journey of Artistry & Imagination</p>
    </footer>

    <script>
        const toggle = document.getElementById("themeToggle");
        toggle.addEventListener("click", () => {
            document.body.classList.toggle("theme-dark");
            toggle.textContent = document.body.classList.contains("theme-dark") ? "☀" : "☾";
        });
    </script>

</body>
</html>
