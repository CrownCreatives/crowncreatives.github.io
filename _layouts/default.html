---
layout: none
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | Crown Creatives</title>

  <!-- Global CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">

  <!-- Load favicon + SEO tags -->
  {% include head.html %}
</head>

<body>

  <!-- ✨ Soft Magical Swirl Layer -->
  <div class="magic-swirl-layer"></div>

  <!-- ✨ Magical Background Layers -->
  <div class="magic-bg-layer"></div>
  <div class="magic-bubbles"></div>

  <!-- ✨ Header -->
  {% include header.html %}

  <!-- ✨ Navigation Bar -->
  {% include nav.html %}

  <!-- ✨ Main Content -->
  <main class="page-wrapper">
    {{ content }}
  </main>

  <!-- ✨ Footer -->
  {% include footer.html %}

  <!-- ✨ Light/Dark Mode Crown Transformation -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.querySelector('.theme-toggle-orb');
      const crown = document.getElementById('crown-emblem');

      if (!toggle || !crown) return;

      toggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');

        crown.src = document.body.classList.contains('dark-mode')
          ? '/assets/images/dark-crown.png'
          : '/assets/images/light-crown.png';
      });
    });
  </script>

</body>
</html>
