<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Crown Creatives</title>

  <!-- Core Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style-core.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style-background-magic.css' | relative_url }}">
</head>

<body>

<!-- ============================================================
     MAGICAL BACKGROUND ENGINE
============================================================ -->
<div class="cc-bg-magic-layer">
  <div class="cc-bg-nebula"></div>
  <div class="cc-bg-stars"></div>
  <div class="cc-bg-particles">
    <div class="cc-bg-particle p1"></div>
    <div class="cc-bg-particle p2"></div>
    <div class="cc-bg-particle p3"></div>
    <div class="cc-bg-particle p4"></div>
    <div class="cc-bg-particle p5"></div>
  </div>
</div>

<div class="magic-particles">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="page-transition-overlay" id="page-transition"></div>

<!-- ============================================================
     HEADER
============================================================ -->
<header class="site-header fade-section">

  <div class="header-left">
    <a href="{{ '/' | relative_url }}" class="header-logo-link">
      <img src="{{ '/assets/icons/day-crown.svg' | relative_url }}"
           alt="Crown Creatives Logo"
           class="header-crown">
    </a>
    <span class="site-title">Crown Creatives</span>
  </div>

  <nav class="site-nav">
    <ul>
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/about' | relative_url }}">About</a></li>
      <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
      <li><a href="{{ '/gallery' | relative_url }}">Gallery</a></li>
      <li><a href="{{ '/podcasts' | relative_url }}">Podcasts</a></li>
      <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
      <li><a href="{{ '/videos' | relative_url }}">Videos</a></li>
    </ul>
  </nav>

  <button id="mobile-menu-toggle" class="mobile-menu-toggle">☰</button>

</header>

<!-- MOBILE MENU -->
<nav id="mobile-menu" class="mobile-menu">
  <ul>
    <li><a href="{{ '/' | relative_url }}">Home</a></li>
    <li><a href="{{ '/about' | relative_url }}">About</a></li>
    <li><a href="{{ '/projects' | relative_url }}">Projects</a></li>
    <li><a href="{{ '/gallery' | relative_url }}">Gallery</a></li>
    <li><a href="{{ '/podcasts' | relative_url }}">Podcasts</a></li>
    <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
    <li><a href="{{ '/videos' | relative_url }}">Videos</a></li>
  </ul>
</nav>

<!-- ============================================================
     PAGE CONTENT
============================================================ -->
<div class="page-wrapper">
  {{ content }}
</div>

<!-- ============================================================
     FOOTER
============================================================ -->
<footer id="footer" class="site-footer fade-section">
  <p>© {{ site.time | date: "%Y" }} Crown Creatives</p>
</footer>

<!-- ============================================================
     JAVASCRIPT (Correct Order)
============================================================ -->

<!-- Core Behaviour -->
<script defer src="{{ '/assets/js/mobile-menu.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/page-transition.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/backtotop.js' | relative_url }}"></script>

<!-- Visual Effects -->
<script defer src="{{ '/assets/js/fade-sections.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/lightbox.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/starfield.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/magic.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/magic-ticker.js' | relative_url }}"></script>

<!-- HERO GALLERY -->
<script defer src="{{ '/assets/js/hero-gallery.js' | relative_url }}"></script>

</body>
</html>
