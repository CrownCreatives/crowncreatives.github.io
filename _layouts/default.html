<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <title>{{ page.title }} — Crown Creatives</title>
</head>

<body class="theme-light">

  <!-- 🌿 Enchanted Forest Background System -->
  <div class="magic-bg-container">
    <div class="magic-bg-gradient"></div>
    <div class="magic-particles"></div>
    <div class="magic-mist-layer"></div>
    <div class="magic-mist-layer-2"></div>
    <div class="magic-leaf-glow"></div>
  </div>

  <!-- ✨ HEADER -->
  {% include header.html %}

  <!-- ✨ MAIN CONTENT -->
  <main class="page-wrapper">
    {{ content }}
  </main>

  <!-- ✨ FOOTER -->
  {% include footer.html %}

  <!-- ✨ JAVASCRIPT -->
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/lightbox.js' | relative_url }}"></script>

  <!-- Scroll-reactive glow -->
  <script>
    document.addEventListener('scroll', () => {
      if (window.scrollY > 40) {
        document.body.classList.add('scrolled');
      } else {
        document.body.classList.remove('scrolled');
      }
    });
  </script>

</body>
</html>
