---
layout: null
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | Crown Creatives</title>

  <!-- Site CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">

</head>

<body id="top">

<header class="site-header">

  <div class="header-top">

    <!-- CC Monogram -->
    <img src="/assets/icons/cc-monogram.png"
         alt="Crown Creatives Crown"
         class="header-crown-img">

    <!-- Theme Toggle -->
    <button class="theme-toggle">
      <img src="/assets/icons/icon-theme-toggle-bold-cyan.png"
           alt="Toggle theme"
           class="theme-toggle-icon">
    </button>

  </div>

  <h1 class="site-title">CROWN CREATIVES</h1>
  <p class="site-tagline">ARTISTRY • RESILIENCE • IMAGINATION</p>

  <nav class="magical-nav">
    <ul>
      <li><a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a></li>
      <li><a href="/about/" {% if page.url contains "/about" %}class="active"{% endif %}>About</a></li>
      <li><a href="/projects/" {% if page.url contains "/projects" %}class="active"{% endif %}>Projects</a></li>
      <li><a href="/gallery/" {% if page.url contains "/gallery" %}class="active"{% endif %}>Gallery</a></li>
      <li><a href="/videos/" {% if page.url contains "/videos" %}class="active"{% endif %}>Videos</a></li>
      <li><a href="/podcasts/" {% if page.url contains "/podcasts" %}class="active"{% endif %}>Podcasts</a></li>
      <li><a href="/blog/" {% if page.url contains "/blog" %}class="active"{% endif %}>Blog</a></li>
      <li><a href="/contact/" {% if page.url contains "/contact" %}class="active"{% endif %}>Contact</a></li>
    </ul>
  </nav>

</header>


<!-- ⭐ PAGE CONTENT FROM index.md, about.md, etc ⭐ -->
<main>
  {{ content }}
</main>


<footer class="site-footer">

  <div class="footer-centre">

    <div class="footer-icons">
      <a href="https://instagram.com" target="_blank">
        <img src="/assets/icons/icon-instagram-bold-cyan.png"
             alt="Instagram" class="footer-icon-img">
      </a>

      <a href="https://facebook.com" target="_blank">
        <img src="/assets/icons/icon-facebook-bold-cyan.png"
             alt="Facebook" class="footer-icon-img">
      </a>

      <a href="mailto:you@example.com">
        <img src="/assets/icons/icon-email-bold-cyan.png"
             alt="Email" class="footer-icon-img">
      </a>
    </div>

    <div class="footer-text">
      © Crown Creatives — Artistry • Resilience • Imagination
    </div>

  </div>

  <div class="footer-right">
    <a href="#top">
      <img src="/assets/icons/icon-up-arrow-bold-cyan.png"
           alt="Back to top" class="footer-icon-img">
    </a>
  </div>

</footer>


<!-- Theme + Magic Engine -->
<script src="/assets/js/theme.js"></script>
<script src="/assets/js/magic.js"></script>

</body>
</html>
