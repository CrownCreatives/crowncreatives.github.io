<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <title>{{ page.title }} — Crown Creatives</title>
</head>

<body>

  <!-- ✨ MAGICAL BACKGROUND LAYERS (correct class names) -->
  <div class="magic-bg-layer"></div>
  <div class="magic-bubbles"></div>
  <div class="magic-swirl"></div>
  <div class="magic-fog"></div>

  <!-- ✨ HEADER -->
  {% include header.html %}

  <!-- ✨ MOBILE MENU PANEL -->
  <div class="mobile-menu-panel" id="mobileMenu">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/about/' | relative_url }}">About</a>
    <a href="{{ '/gallery/' | relative_url }}">Gallery</a>
    <a href="{{ '/contact/' | relative_url }}">Contact</a>
  </div>

  <!-- ✨ PAGE CONTENT -->
  <main class="site-content">
    {{ content }}
  </main>

  <!-- ✨ LIGHTBOX OVERLAY -->
  <div class="lightbox-overlay" id="lightbox">
    <div class="lightbox-content">
      <img id="lightbox-img" src="">
    </div>
    <div class="lightbox-close" onclick="closeLightbox()">×</div>
  </div>

  <!-- ✨ FOOTER -->
  {% include footer.html %}

  <!-- ✨ JAVASCRIPT (LOAD ORDER MATTERS) -->
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/mobile-menu.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/lightbox.js' | relative_url }}"></script>

</body>
</html>
