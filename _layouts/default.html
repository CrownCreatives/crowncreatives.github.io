---
layout: none
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | Crown Creatives</title>

  <!-- Your CSS file -->
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

  <!-- ✨ Magical Background Layers -->
  <div class="magic-bg-layer"></div>
  <div class="magic-bubbles"></div>

  <!-- ✨ Header -->
  <header class="site-header">
    <div class="site-header-inner">

      <div class="header-left">
        <div class="header-crown">
          <img src="/assets/icons/crown.svg" alt="Crown">
        </div>

        <div class="header-title-block">
          <div class="site-title">Crown Creatives</div>
          <div class="site-tagline">Where imagination becomes reality</div>
        </div>
      </div>

      <div class="header-right">
        <div class="theme-toggle">
          <div class="theme-toggle-knob"></div>
        </div>
      </div>

    </div>
  </header>

  <!-- ✨ Main Content -->
  <main class="page-wrapper">
    {{ content }}
  </main>

  <!-- ✨ Inspirational Ticker -->
  <div class="ticker-container">
    <div class="ticker-track">
      Believe in your creativity • Every idea begins with imagination • Keep creating • Magic happens when you do
    </div>
  </div>

  <!-- ✨ Magical Glowing Footer Line -->
  <div class="footer-magic-line"></div>

  <!-- ✨ Floating Footer Icons -->
  <div class="footer-icons">
    <a href="https://www.facebook.com/people/Crown-Creatives/61556386467490/" target="_blank">
      <img src="/assets/icons/facebook.svg" alt="Facebook" width="28">
    </a>

    <a href="https://www.instagram.com/crown_creatives_uk/" target="_blank">
      <img src="/assets/icons/instagram.svg" alt="Instagram" width="28">
    </a>

    <a href="mailto:crowncreatives@outlook.com">
      <img src="/assets/icons/email.svg" alt="Email" width="28">
    </a>

    <a href="https://copilot.microsoft.com" target="_blank">
      <img src="/assets/icons/copilot.svg" alt="Copilot" width="28">
    </a>
  </div>

  <!-- ✨ Footer Text -->
  <footer class="site-footer">
    <div class="footer-text">
      © Crown Creatives — Powered by <a href="https://copilot.microsoft.com" target="_blank">Copilot</a>
    </div>
  </footer>

</body>
</html>
