---
layout: default
---

<!-- ============================================================
     HOME HERO HEADER
============================================================ -->
<header class="header-home">

  <!-- Background Crown + Emblem Text -->
  <div class="hero-background-crown">
    <img 
      src="/assets/icons/cc-magic.svg" 
      alt="Crown Creatives Background Crown"
    >
    <p class="hero-emblem-text">
      Crown Creatives is a space for artistry, imagination, and personal recovery.
    </p>
  </div>

  <div class="header-home-inner fade-section">

    <!-- Small Header Crown (100px) -->
    <img 
      src="/assets/icons/crown-hero.png" 
      alt="Crown Creatives Hero Crown" 
      class="header-crown-hero"
    >

    <!-- Hero Title -->
    <h1 class="hero-title">
      {{ page.hero_title | default: "Crown Creatives" }}
    </h1>

    <!-- Hero Tagline -->
    <p class="hero-tagline">
      {{ page.hero_tagline | default: "Artistry • Imagination • Resilience" }}
    </p>

  </div>

</header>

<!-- ============================================================
     MAIN CONTENT
============================================================ -->
<main class="home-content fade-section">
  {{ content }}
</main>
