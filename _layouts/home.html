---
layout: default
---

<!-- ============================================================
     CINEMATIC HERO — CLEAN + CORRECT
============================================================ -->
<section class="hero-cinematic fade-section">

  <!-- HERO CROWN (Correct Path + Day/Night Swap Ready) -->
  <img
    src="{{ '/assets/icons/day-crown.svg' | relative_url }}"
    data-day="{{ '/assets/icons/day-crown.svg' | relative_url }}"
    data-night="{{ '/assets/icons/crown-hero-night.png' | relative_url }}"
    alt="Crown Creatives Hero Emblem"
    class="hero-crown-cinematic"
  >

  <!-- TAGLINE ONLY (No Title Here) -->
  <div class="hero-text">
    <p>{{ page.hero_tagline | default: "Where imagination becomes reality" }}</p>
  </div>

</section>

<!-- ============================================================
     MAIN HOMEPAGE CONTENT (Cards, etc.)
============================================================ -->
<main class="home-content fade-section">
  {{ content }}
</main>

<!-- ============================================================
     LIGHTBOX (Used by Gallery or Future Media)
============================================================ -->
<div class="cc-lightbox-overlay" id="lightbox">
  <img class="cc-lightbox-image" id="lightbox-img" src="" alt="">
</div>
