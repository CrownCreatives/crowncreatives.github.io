---
layout: default
---

<div class="hero-main">
  <div class="hero-main-inner">

    <!-- HERO CROWN -->
    <img src="/assets/icons/crown-hero.png" class="hero-main-crown" alt="Crown Creatives">

    <!-- HERO EXPLAINER -->
    <p class="hero-main-explainer">
      {{ page.explainer }}
    </p>

    <!-- HERO GALLERY LANES -->
    <div class="hero-gallery-lane lane-left">
      {% for image in page.lane_left %}
        <img src="{{ image }}" alt="">
      {% endfor %}
    </div>

    <div class="hero-gallery-lane lane-right">
      {% for image in page.lane_right %}
        <img src="{{ image }}" alt="">
      {% endfor %}
    </div>

    <!-- MAIN GALLERY IMAGE -->
    <div class="hero-gallery">
      <div class="hero-gallery-inner">
        <img src="{{ page.hero_image }}" alt="">
      </div>
    </div>

  </div>
</div>
