---
layout: default
---

<!-- ============================================================
     GLOBAL HEADER (from _includes/header-home.html)
============================================================ -->
{% include header-home.html %}

<!-- ============================================================
     OPTIONAL HERO SECTION (clean + minimal)
     You can customise this or remove it entirely.
============================================================ -->
<section class="home-hero fade-section">

  <div class="home-hero-inner">

    <!-- Hero Crown -->
    <img 
      src="/assets/icons/cc-monogram.svg" 
      alt="Crown Creatives Monogram Crown" 
      class="hero-crown"
    >

    <!-- Hero Title -->
    <h1 class="hero-title">
      {{ page.hero_title | default: "Crown Creatives" }}
    </h1>

    <!-- Hero Tagline -->
    <p class="hero-tagline">
      {{ page.hero_tagline | default: "Artistry • Imagination • Resilience" }}
    </p>

  </div>

</section>

<!-- ============================================================
     MAIN CONTENT
============================================================ -->
<main class="home-content fade-section">
  {{ content }}
</main>
