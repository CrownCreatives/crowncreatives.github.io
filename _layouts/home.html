---
layout: default
---

<!-- ============================================================
     HOME HERO HEADER (Clean — SVG Crown, No Background Crown)
============================================================ -->
<header class="header-home">

  <div class="header-home-inner fade-section">

    <!-- Header Crown (SVG) -->
    <img 
      src="/assets/icons/cc-monogram.svg" 
      alt="Crown Creatives Monogram Crown" 
      class="header-crown-hero"
    >

    <!-- Hero Title -->
    <h1 class="hero-title">
      {{ page.hero_title | default: "Crown Creatives" }}
    </h1>

    <!-- Hero Tagline -->
    <p class="hero-tagline">
      {{ page.hero_tagline | default: "Artistry • Imagination • Resilience" }}
    </p>

  </div>

</header>

<!-- ============================================================
     MAIN CONTENT
============================================================ -->
<main class="home-content fade-section">
  {{ content }}
</main>
