name: Build Gallery JSON

on:
  push:
    paths:
      - "assets/images/gallery/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate gallery.json
        run: |
          echo "{ \"images\": [" > assets/images/gallery/gallery.json
          find assets/images/gallery -maxdepth 1 -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" \) \
            | sed 's/^/  \"/; s/$/\",/' >> assets/images/gallery/gallery.json
          sed -i '$ s/,$//' assets/images/gallery/gallery.json
          echo "] }" >> assets/images/gallery/gallery.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/images/gallery/gallery.json
          git commit -m "Auto-update gallery.json" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
