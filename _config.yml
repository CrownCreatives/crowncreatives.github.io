title: Crown Creatives
description: Artistry • Resilience • Imagination

# GitHub Pages settings
baseurl: ""
url: "https://crowncreatives.github.io"

markdown: kramdown

# Force rebuild (increment this number whenever GitHub Pages gets stuck)
version: 6

# Disable default GitHub Pages theme
theme: null

# Default layout for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"

# Allow Jekyll to process custom folders
include:
  - _pages

# GitHub Pages–approved plugins only
plugins:
  - jekyll-feed
  - jekyll-seo-tag
