---
title: "Crown Creatives – Editing Guide"
---

# Logging in

1. Go to `/admin` on the live site.
2. Log in with your GitHub account.
3. Once logged in, you’ll see collections on the left (Blog, Projects, Gallery, etc.).

> _Screenshot placeholder:_  
> `assets/images/user-guide/dashboard.png`

# Editing the homepage

1. Click **Homepage** in the left menu.
2. Open **Homepage Content**.
3. Edit the hero title, subtitle, and cards.
4. Click **Publish** in the top right.

> _Screenshot placeholder:_  
> `assets/images/user-guide/homepage-edit.png`

# Editing the About page

1. Click **About Page**.
2. Edit the text in the editor.
3. Click **Publish**.

> _Screenshot placeholder:_  
> `assets/images/user-guide/about-edit.png`

# Adding a blog post

1. Click **Blog Posts**.
2. Click **New Blog Post**.
3. Fill in title, date, image, tags, and content.
4. Click **Publish**.

> _Screenshot placeholder:_  
> `assets/images/user-guide/blog-new.png`

# Adding projects, gallery items, podcasts, and videos

The flow is the same:

1. Choose the collection (Projects, Gallery, Podcasts, Videos).
2. Click **New**.
3. Fill in fields (title, image, description, links).
4. Click **Publish**.

# Editing the footer

1. Click **Footer**.
2. Open **Footer Content**.
3. Edit email, social links, or copyright text.
4. Click **Publish**.

# Uploading images

1. In any collection, click on an image field.
2. Upload a new image.
3. The file will be stored in `assets/images`.
4. Save and publish.

# Undoing mistakes

All changes are stored in GitHub:

- If something breaks, you (or a dev friend) can revert to a previous commit.
- Each CMS change creates a commit in the repo.
